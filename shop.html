<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة المحل — سوق أهلنا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:#1A237E; --navy-dark:#0D1757; --orange:#FF9800; --orange-dark:#F57C00;
  --bg:#F5F6FA; --text:#1a1a2e; --text2:#555670; --text3:#9899B0;
  --border:#E2E3EF; --card:#ffffff; --radius:14px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(26,35,126,0.08); --shadow-md:0 4px 24px rgba(26,35,126,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);}
.navbar{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.nav-back{color:rgba(255,255,255,0.85);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);transition:background 0.2s;text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,0.1);}
.nav-logo{color:#fff;font-size:16px;font-weight:700;}
.nav-logo span{color:var(--orange);}
.nav-fav{background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;transition:all 0.2s;}
.nav-fav:hover{background:rgba(255,255,255,0.2);}
.nav-fav.active{color:#ff6b6b;}

.shop-hero{height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to bottom,transparent,var(--bg));}

.page-wrap{max-width:900px;margin:0 auto;padding:0 16px 100px;}
.shop-header-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-top:-24px;position:relative;z-index:2;margin-bottom:16px;}
.shop-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.shop-title{font-size:22px;font-weight:700;line-height:1.2;}
.open-pill{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.open-pill.open{background:#E8F5E9;color:#1B5E20;}
.open-pill.closed{background:#FFEBEE;color:#B71C1C;}
.shop-cat-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.cat-badge{background:#E8EAF6;color:var(--navy);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.featured-badge{background:var(--orange);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.rating-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.stars-big{color:var(--orange);font-size:18px;}
.rating-num{font-size:22px;font-weight:700;}
.rating-count{font-size:13px;color:var(--text3);}
.divider-v{width:1px;height:20px;background:var(--border);}
.info-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.info-pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn-action{padding:12px 8px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s;}
.btn-call{background:var(--navy);color:#fff;}
.btn-call:hover{background:var(--navy-dark);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover{background:#1DA851;}
.btn-share{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-share:hover{background:var(--border);}

.tabs-bar{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:6px;gap:4px;margin-bottom:16px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;padding:9px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif;background:transparent;color:var(--text3);white-space:nowrap;transition:all 0.2s;min-width:80px;}
.tab-btn.active{background:var(--navy);color:#fff;}

.panel{display:none;}
.panel.active{display:block;}

.about-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.about-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.about-text{font-size:13px;color:var(--text2);line-height:1.8;}
.info-table{width:100%;border-collapse:collapse;}
.info-table tr{border-bottom:1px solid var(--border);}
.info-table tr:last-child{border-bottom:none;}
.info-table td{padding:10px 4px;font-size:13px;}
.info-table td:first-child{color:var(--text3);width:40%;}
.info-table td:last-child{color:var(--text);font-weight:500;}

.products-filter{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.products-filter::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif;color:var(--text2);white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.filter-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.product-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.product-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.product-body{padding:10px;}
.product-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.product-price{font-size:14px;font-weight:700;color:var(--orange);}
.product-old-price{font-size:11px;color:var(--text3);text-decoration:line-through;}
.product-stock{font-size:10px;margin-top:4px;}
.in-stock{color:#2E7D32;}
.out-stock{color:#B71C1C;}

.review-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;display:flex;gap:24px;align-items:center;}
.review-big-num{font-size:48px;font-weight:700;line-height:1;flex-shrink:0;}
.review-big-stars{color:var(--orange);font-size:20px;margin-bottom:4px;}
.review-big-count{font-size:12px;color:var(--text3);}
.bars-wrap{flex:1;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-label{font-size:12px;color:var(--text3);width:16px;text-align:center;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;background:var(--orange);border-radius:3px;transition:width 0.6s;}
.bar-count{font-size:11px;color:var(--text3);width:24px;flex-shrink:0;}

.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.reviewer-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.reviewer-name{font-size:13px;font-weight:700;}
.reviewer-date{font-size:11px;color:var(--text3);}
.review-stars{color:var(--orange);font-size:13px;}
.review-text{font-size:13px;color:var(--text2);line-height:1.7;}

.write-review-btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:14px;transition:background 0.2s;}
.write-review-btn:hover{background:var(--navy-dark);}

.map-placeholder{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;color:var(--text3);font-size:14px;cursor:pointer;transition:background 0.2s;position:relative;overflow:hidden;}
.map-placeholder:hover{background:var(--bg);}
.map-icon{font-size:40px;}
.map-grid{position:absolute;inset:0;opacity:0.05;background-image:repeating-linear-gradient(0deg,var(--navy) 0px,transparent 1px,transparent 40px,var(--navy) 41px),repeating-linear-gradient(90deg,var(--navy) 0px,transparent 1px,transparent 40px,var(--navy) 41px);}

.float-cta{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:90;max-width:900px;margin:0 auto;}

.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:40px;color:var(--text3);}
.empty-state-icon{font-size:48px;margin-bottom:12px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:#2E7D32;}
.toast.error{background:#B71C1C;}

@media(max-width:600px){
  .action-row{grid-template-columns:1fr 1fr;}
  .btn-share{grid-column:span 2;}
  .review-summary{flex-direction:column;align-items:flex-start;gap:12px;}
  .products-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="nav-back" href="index.html">← الرئيسية</a>
  <div class="nav-logo">سوق <span>أهلنا</span></div>
  <button class="nav-fav" id="favBtn" onclick="toggleFav()">🤍</button>
</nav>

<div id="pageContent">
  <div class="loading-screen"><div class="spinner"></div><div>جارٍ تحميل المحل...</div></div>
</div>

<div class="float-cta" id="floatCta" style="display:none">
  <button class="btn-action btn-call" id="callBtn">📞 اتصال مباشر</button>
  <button class="btn-action btn-wa" id="waBtn">💬 واتساب</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zmspznedsdgbzwzyvnoa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptc3B6bmVkc2RnYnp3enl2bm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDYzNzAsImV4cCI6MjA5MTQ4MjM3MH0.rC48GyFMbhZzoJu-_RSrGC57VbRqkY4YNMcacUUmE0k';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function getParam(key) { return new URLSearchParams(window.location.search).get(key); }
</script>
<script>
const BG_COLORS=['#E3F2FD','#FFF8E1','#F3E5F5','#E8F5E9','#FFF3E0','#FFEBEE','#E8EAF6','#FFFDE7'];
const CAT_EMOJIS={'ملابس رجالية':'👔','ملابس نسائية':'👗','إلكترونيات':'📱','أجهزة كهربائية':'🔌','مواد منزلية':'🛋️','مطاعم':'🍽️','صيدليات':'💊','مخابز':'🥖','مجوهرات':'💍','أثاث':'🪑','سيارات':'🚗'};

let isFav = false;
let store = null;
let allProducts = [];
let favorites = new Set(JSON.parse(localStorage.getItem('favs')||'[]'));

window.addEventListener('DOMContentLoaded', async () => {
  const shopId = getParam('id');
  if (!shopId) { window.location.href='index.html'; return; }
  isFav = favorites.has(shopId);
  document.getElementById('favBtn').textContent = isFav ? '❤️' : '🤍';
  document.getElementById('favBtn').classList.toggle('active', isFav);
  await loadShop(shopId);
});

async function loadShop(id) {
  const [{data: s}, {data: prods}, {data: revs}, {count: viewCount}] = await Promise.all([
    sb.from('stores').select('*').eq('id', id).single(),
    sb.from('products').select('*').eq('store_id', id).eq('active', true),
    sb.from('reviews').select('*').eq('store_id', id).order('created_at',{ascending:false}).limit(10),
    sb.from('store_views').select('*',{count:'exact',head:true}).eq('store_id', id),
  ]);
  if (!s) { document.getElementById('pageContent').innerHTML='<div class="loading-screen"><div class="empty-state-icon">🔍</div><div>المحل غير موجود</div></div>'; return; }
  store = s;
  allProducts = prods || [];
  document.title = `${s.name} — سوق أهلنا`;

  // record view
  sb.from('store_views').insert([{store_id: id}]).then(()=>{});

  const bg = BG_COLORS[0];
  const emoji = CAT_EMOJIS[s.category]||'🏪';
  const avgRating = revs && revs.length ? (revs.reduce((a,r)=>a+r.rating,0)/revs.length).toFixed(1) : '4.8';
  const reviewCount = revs?.length || 0;

  document.getElementById('pageContent').innerHTML = `
    <div class="shop-hero" style="background:${bg}">${emoji}<div class="hero-overlay"></div></div>
    <div class="page-wrap">
      <div class="shop-header-card">
        <div class="shop-title-row">
          <div class="shop-title">${s.name}</div>
          <div class="open-pill open">🟢 مفتوح الآن</div>
        </div>
        <div class="shop-cat-row">
          <span class="cat-badge">${emoji} ${s.category||''}</span>
          ${s.plan==='premium'||s.plan==='pro'?'<span class="featured-badge">⭐ مميز</span>':''}
        </div>
        <div class="rating-row">
          <span class="stars-big">★★★★★</span>
          <span class="rating-num">${avgRating}</span>
          <div class="divider-v"></div>
          <span class="rating-count">${reviewCount} تقييم</span>
          <div class="divider-v"></div>
          <span class="rating-count">👁 ${viewCount||0} مشاهدة</span>
        </div>
        <div class="info-pills">
          <div class="info-pill">📍 ${s.area||''}, ${s.governorate||''}</div>
          ${s.phone?`<div class="info-pill">📞 ${s.phone}</div>`:''}
        </div>
        <div class="action-row">
          <button class="btn-action btn-call" id="callBtn2">📞 اتصال</button>
          <button class="btn-action btn-wa" id="waBtn2">💬 واتساب</button>
          <button class="btn-action btn-share" onclick="shareShop()">🔗 مشاركة</button>
        </div>
      </div>

      <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('products',this)">المنتجات (${allProducts.length})</button>
        <button class="tab-btn" onclick="switchTab('about',this)">عن المحل</button>
        <button class="tab-btn" onclick="switchTab('reviews',this)">التقييمات (${reviewCount})</button>
        <button class="tab-btn" onclick="switchTab('location',this)">الموقع</button>
      </div>

      <!-- PRODUCTS -->
      <div class="panel active" id="panel-products">
        ${allProducts.length ? renderProductsHTML(allProducts) : '<div class="empty-state"><div class="empty-state-icon">📦</div><div>لا توجد منتجات بعد</div></div>'}
      </div>

      <!-- ABOUT -->
      <div class="panel" id="panel-about">
        <div class="about-card">
          <div class="about-title">🏪 عن المحل</div>
          <div class="about-text">${s.description||'محل مسجّل في سوق أهلنا — تواصل مع التاجر لمعرفة المزيد.'}</div>
        </div>
        <div class="about-card">
          <div class="about-title">📋 معلومات المحل</div>
          <table class="info-table">
            <tr><td>الاسم</td><td>${s.name}</td></tr>
            <tr><td>التصنيف</td><td>${s.category||'—'}</td></tr>
            <tr><td>المحافظة</td><td>${s.governorate||'—'}</td></tr>
            <tr><td>المنطقة</td><td>${s.area||'—'}</td></tr>
            ${s.phone?`<tr><td>الهاتف</td><td>${s.phone}</td></tr>`:''}
            ${s.instagram?`<tr><td>انستغرام</td><td>${s.instagram}</td></tr>`:''}
            <tr><td>الاشتراك</td><td>✅ ${s.plan==='premium'?'بريميم':s.plan==='pro'?'احترافي':'أساسي'}</td></tr>
          </table>
        </div>
      </div>

      <!-- REVIEWS -->
      <div class="panel" id="panel-reviews">
        ${renderReviewsHTML(revs||[], avgRating, reviewCount)}
        <button class="write-review-btn" onclick="openWriteReview('${s.id}')">✍️ أكتب تقييمك</button>
      </div>

      <!-- LOCATION -->
      <div class="panel" id="panel-location">
        <div class="map-placeholder" onclick="openMap()">
          <div class="map-grid"></div>
          <div class="map-icon">🗺️</div>
          <div>${s.area||''}, ${s.governorate||''} — العراق</div>
          <div style="font-size:12px;color:var(--text3)">اضغط لفتح الخريطة</div>
        </div>
        <div class="about-card">
          <div class="about-title">📍 الموقع</div>
          <div class="about-text">${s.area||''}, ${s.governorate||''}, العراق</div>
        </div>
      </div>
    </div>`;

  // setup call/wa buttons
  document.getElementById('floatCta').style.display='grid';
  const setupCallWa = (callId, waId) => {
    document.getElementById(callId).onclick = () => { if(s.phone) window.open('tel:'+s.phone); else showToast('لا يوجد رقم هاتف'); };
    document.getElementById(waId).onclick = () => { if(s.whatsapp||s.phone) window.open('https://wa.me/964'+((s.whatsapp||s.phone).replace(/^0/,'')),'_blank'); else showToast('لا يوجد رقم واتساب'); };
  };
  setupCallWa('callBtn2','waBtn2');
  setupCallWa('callBtn','waBtn');
}

function renderProductsHTML(prods) {
  return `<div class="products-grid">
    ${prods.map((p,i)=>{
      const img = p.images && p.images.length ? p.images[0] : null;
      const thumb = img
        ? `<div class="product-thumb" style="padding:0;background:${BG_COLORS[i%BG_COLORS.length]}">
             <img src="${img}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='${CAT_EMOJIS[p.category]||'📦'}'">
           </div>`
        : `<div class="product-thumb" style="background:${BG_COLORS[i%BG_COLORS.length]}">${CAT_EMOJIS[p.category]||'📦'}</div>`;
      return `
      <div class="product-card" onclick="openProductDetail(${JSON.stringify(p).replace(/'/g,"\\'")})" style="cursor:pointer;">
        ${thumb}
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${Number(p.price).toLocaleString('ar-IQ')} د.ع</div>
          <div class="product-stock ${p.quantity>0?'in-stock':'out-stock'}">${p.quantity>0?'✔ متوفر':'✖ نفد'}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function openProductDetail(p) {
  const imgs = p.images && p.images.length ? p.images : [];
  let currentImg = 0;
  const renderGallery = () => imgs.length
    ? `<div style="position:relative;background:#000;border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;">
         <img id="pdMainImg" src="${imgs[currentImg]}" style="width:100%;height:260px;object-fit:contain;display:block;">
         ${imgs.length>1?`
           <button onclick="pdPrev()" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;cursor:pointer;font-size:18px;line-height:1;">›</button>
           <button onclick="pdNext()" style="position:absolute;top:50%;left:12px;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;cursor:pointer;font-size:18px;line-height:1;">‹</button>
           <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;">
             ${imgs.map((_,i)=>`<div class="pd-dot" data-i="${i}" style="width:7px;height:7px;border-radius:50%;background:${i===0?'#fff':'rgba(255,255,255,0.4)';};cursor:pointer;" onclick="pdGoto(${i})"></div>`).join('')}
           </div>`:''}
       </div>
       ${imgs.length>1?`<div style="display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;">
         ${imgs.map((u,i)=>`<img src="${u}" onclick="pdGoto(${i})" style="width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid ${i===0?'var(--navy)':'var(--border)'};flex-shrink:0;" id="pdThumb${i}">`).join('')}
       </div>`:''}` 
    : `<div style="height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;background:${BG_COLORS[0]};border-radius:var(--radius) var(--radius) 0 0;">${CAT_EMOJIS[p.category]||'📦'}</div>`;

  document.getElementById('pdContent').innerHTML = `
    ${renderGallery()}
    <div style="padding:16px 20px 24px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">
        <div style="font-size:18px;font-weight:700;line-height:1.3;">${p.name}</div>
        <button onclick="closePD()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);flex-shrink:0;line-height:1;">✕</button>
      </div>
      <div style="font-size:24px;font-weight:800;color:var(--orange);margin-bottom:10px;">${Number(p.price).toLocaleString('ar-IQ')} <span style="font-size:14px;font-weight:500;">د.ع</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <span style="background:${p.quantity>0?'#E8F5E9':'#FFEBEE'};color:${p.quantity>0?'#1B5E20':'#B71C1C'};font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;">${p.quantity>0?'✔ متوفر ('+p.quantity+')':'✖ نفد المخزون'}</span>
        ${p.category?`<span style="background:#E8EAF6;color:var(--navy);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;">${p.category}</span>`:''}
      </div>
      ${p.description?`<div style="font-size:13px;color:var(--text2);line-height:1.9;background:var(--bg);border-radius:var(--radius-sm);padding:12px;">${p.description}</div>`:''}
      <button onclick="closePD();document.getElementById('callBtn2').click()" style="width:100%;margin-top:16px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;">📞 تواصل مع المحل للطلب</button>
    </div>`;

  window.__pdImgs = imgs;
  window.__pdCurrent = 0;
  document.getElementById('pdOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

window.pdGoto = function(i) {
  const imgs = window.__pdImgs;
  window.__pdCurrent = i;
  const main = document.getElementById('pdMainImg');
  if (main) main.src = imgs[i];
  document.querySelectorAll('.pd-dot').forEach((d,j)=>d.style.background=j===i?'#fff':'rgba(255,255,255,0.4)');
  imgs.forEach((_,j)=>{ const t=document.getElementById('pdThumb'+j); if(t) t.style.borderColor=j===i?'var(--navy)':'var(--border)'; });
};
window.pdNext = function() { const n=(window.__pdCurrent+1)%window.__pdImgs.length; window.pdGoto(n); };
window.pdPrev = function() { const n=(window.__pdCurrent-1+window.__pdImgs.length)%window.__pdImgs.length; window.pdGoto(n); };
window.closePD = function() { document.getElementById('pdOverlay').classList.remove('open'); document.body.style.overflow=''; };

function renderReviewsHTML(revs, avg, count) {
  if (!count) return '<div class="empty-state"><div class="empty-state-icon">⭐</div><div>لا توجد تقييمات بعد — كن أول من يقيّم</div></div>';
  const dist=[5,4,3,2,1].map(s=>({star:s,count:revs.filter(r=>r.rating===s).length}));
  const maxC = Math.max(...dist.map(d=>d.count),1);
  const AVCOLORS=['#E8EAF6','#E8F5E9','#FFF3E0','#F3E5F5','#E3F2FD'];
  return `
    <div class="review-summary">
      <div><div class="review-big-num">${avg}</div><div class="review-big-stars">★★★★★</div><div class="review-big-count">من ${count} تقييم</div></div>
      <div class="bars-wrap">${dist.map(d=>`<div class="bar-row"><span class="bar-label">${d.star}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.count/maxC*100)}%"></div></div><span class="bar-count">${d.count}</span></div>`).join('')}</div>
    </div>
    ${revs.slice(0,5).map((r,i)=>`
      <div class="review-card">
        <div class="reviewer-row">
          <div class="avatar" style="background:${AVCOLORS[i%5]}">${r.reviewer_name?r.reviewer_name[0]:'ز'}</div>
          <div style="flex:1"><div class="reviewer-name">${r.reviewer_name||'زبون'}</div><div class="reviewer-date">${new Date(r.created_at).toLocaleDateString('ar-IQ')}</div></div>
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        </div>
        <div class="review-text">${r.comment||''}</div>
      </div>`).join('')}`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function toggleFav() {
  const id = getParam('id');
  isFav = !isFav;
  if(isFav) favorites.add(id); else favorites.delete(id);
  localStorage.setItem('favs', JSON.stringify([...favorites]));
  document.getElementById('favBtn').textContent = isFav?'❤️':'🤍';
  document.getElementById('favBtn').classList.toggle('active', isFav);
  showToast(isFav?'تمت الإضافة للمفضلة ❤️':'تمت الإزالة');
}

function shareShop() {
  if (navigator.share) navigator.share({title:store?.name, url:window.location.href});
  else { navigator.clipboard.writeText(window.location.href); showToast('تم نسخ رابط المحل 🔗'); }
}

function openMap() {
  if (store?.lat && store?.lng) window.open(`https://maps.google.com/?q=${store.lat},${store.lng}`,'_blank');
  else showToast('الموقع غير محدد على الخريطة');
}

async function openWriteReview(storeId) {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) { showToast('يرجى تسجيل الدخول أولاً'); return; }
  const rating = prompt('تقييمك من 1 إلى 5:');
  const comment = prompt('تعليقك:');
  if (!rating || !comment) return;
  const {error} = await sb.from('reviews').insert([{store_id:storeId, user_id:session.user.id, reviewer_name:session.user.user_metadata?.full_name||'زبون', rating:parseInt(rating), comment}]);
  if (error) { showToast('خطأ: '+error.message); return; }
  showToast('تم إرسال تقييمك ✅');
  await loadShop(storeId);
}

let toastTimer;
function showToast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||'')+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
</script>

  <div id="pdContent" style="background:#fff;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border-radius:var(--radius) var(--radius) 0 0;animation:slideUp 0.3s ease;"></div>
