<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المتجر</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#000;--crimson:#8B0000;--crimson-light:#b00000;--gold:#c9a84c;--white:#f5f0eb;--gray:#1a1a1a;--gray-mid:#2a2a2a;--text-muted:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Noto Naskh Arabic',serif;direction:rtl;min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(139,0,0,.15),transparent)}
.login-box{background:var(--gray);border:1px solid rgba(201,168,76,.2);padding:3rem 2rem;max-width:380px;width:100%;text-align:center;position:relative}
.login-box::before{content:'';position:absolute;top:-1px;left:0;right:0;height:3px;background:linear-gradient(to right,var(--crimson),var(--gold),var(--crimson))}
.login-logo{font-size:3rem;margin-bottom:1rem}
.login-title{font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:.4rem}
.login-sub{font-size:.82rem;color:var(--text-muted);margin-bottom:2rem}
.login-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(201,168,76,.3);color:var(--white);padding:1rem;font-size:1.3rem;font-family:'Noto Naskh Arabic',serif;text-align:center;outline:none;letter-spacing:.4em;margin-bottom:1rem;-webkit-appearance:none}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--crimson);color:var(--white);border:none;padding:1rem;font-family:'Noto Naskh Arabic',serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:.2s}
.login-btn:hover{background:var(--crimson-light)}
.login-error{color:#ff6b6b;font-size:.82rem;margin-top:.8rem;min-height:1.2em}

/* MAIN */
#main-screen{display:none;min-height:100vh}
header{background:var(--gray);border-bottom:1px solid rgba(201,168,76,.15);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-logo{font-size:1rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:.5rem}
.header-actions{display:flex;gap:.8rem;align-items:center}
.visit-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text-muted);padding:.4rem .9rem;font-family:'Noto Naskh Arabic',serif;font-size:.78rem;cursor:pointer;transition:.2s;text-decoration:none;display:inline-block}
.visit-btn:hover{border-color:var(--gold);color:var(--gold)}
.logout-btn{background:transparent;border:1px solid rgba(139,0,0,.4);color:var(--crimson-light);padding:.4rem .9rem;font-family:'Noto Naskh Arabic',serif;font-size:.78rem;cursor:pointer;transition:.2s}
.logout-btn:hover{background:var(--crimson);color:var(--white)}

.content{max-width:800px;margin:0 auto;padding:2rem 1.2rem 4rem}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--gray);border:1px solid rgba(255,255,255,.06);padding:1.2rem;text-align:center}
.stat-num{font-size:2rem;font-weight:700;color:var(--gold)}
.stat-label{font-size:.75rem;color:var(--text-muted);margin-top:.3rem}

/* SECTION */
.section-title{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;padding-bottom:.6rem;border-bottom:1px solid rgba(255,255,255,.07)}

/* ADD FORM */
.add-form{background:var(--gray);border:1px solid rgba(255,255,255,.07);padding:1.5rem;margin-bottom:2.5rem;position:relative}
.add-form::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:linear-gradient(to right,var(--crimson),transparent)}
.field{margin-bottom:1.2rem}
.field label{display:block;font-size:.82rem;color:rgba(255,255,255,.6);margin-bottom:.4rem}
.field label span{color:var(--crimson-light)}
.field input,.field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(201,168,76,.2);color:var(--white);padding:.8rem 1rem;font-family:'Noto Naskh Arabic',serif;font-size:.95rem;outline:none;transition:.2s;direction:rtl;-webkit-appearance:none}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.2)}
.field input:focus,.field textarea:focus{border-color:var(--crimson);background:rgba(139,0,0,.05)}
.field textarea{resize:vertical;min-height:80px}
.two-col{display:grid;gap:1rem}
@media(min-width:500px){.two-col{grid-template-columns:1fr 1fr}}

.img-upload{border:2px dashed rgba(201,168,76,.25);padding:1.5rem;text-align:center;cursor:pointer;transition:.2s;position:relative;background:rgba(255,255,255,.02)}
.img-upload:hover{border-color:var(--gold);background:rgba(201,168,76,.03)}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload-icon{font-size:2rem;margin-bottom:.4rem}
.img-upload-text{font-size:.82rem;color:var(--text-muted)}
.img-upload-text b{color:var(--gold)}
#img-preview{width:100%;max-height:200px;object-fit:cover;display:none;margin-top:.8rem;border:1px solid rgba(255,255,255,.1)}

.progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;display:none;margin-top:.8rem}
.progress-fill{height:100%;background:linear-gradient(to right,var(--crimson),var(--gold));width:0%;transition:width .3s}

.add-btn{width:100%;background:var(--crimson);color:var(--white);border:none;padding:1rem;font-family:'Noto Naskh Arabic',serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:.5rem}
.add-btn:hover{background:var(--crimson-light)}
.add-btn:disabled{opacity:.5;cursor:not-allowed}

/* PRODUCTS LIST */
.products-list{display:flex;flex-direction:column;gap:.8rem}
.product-row{background:var(--gray);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:1rem;padding:.8rem 1rem;transition:.2s}
.product-row:hover{border-color:rgba(255,255,255,.12)}
.product-thumb{width:64px;height:64px;object-fit:cover;flex-shrink:0;background:var(--gray-mid)}
.product-thumb-ph{width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:var(--gray-mid);flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-row-name{font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-row-price{font-size:.8rem;color:var(--gold)}
.product-row-badge{font-size:.7rem;color:var(--text-muted);margin-top:.1rem}
.product-actions{display:flex;gap:.5rem;flex-shrink:0}
.btn-del{background:transparent;border:1px solid rgba(139,0,0,.4);color:var(--crimson-light);padding:.35rem .8rem;font-family:'Noto Naskh Arabic',serif;font-size:.75rem;cursor:pointer;transition:.2s}
.btn-del:hover{background:var(--crimson);color:var(--white)}
.empty-msg{color:var(--text-muted);font-size:.88rem;text-align:center;padding:2.5rem;background:var(--gray);border:1px dashed rgba(255,255,255,.08)}

/* TOAST */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gray-mid);border:1px solid var(--gold);color:var(--white);padding:1rem 2rem;font-size:.9rem;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);text-align:center;min-width:260px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.error{border-color:var(--crimson)}

/* CONFIRM MODAL */
#confirm-modal{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:1rem}
#confirm-modal.open{display:flex}
.confirm-box{background:var(--gray);border:1px solid rgba(139,0,0,.4);padding:2rem;max-width:360px;width:100%;text-align:center}
.confirm-title{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:.8rem}
.confirm-msg{font-size:.85rem;color:var(--text-muted);margin-bottom:1.5rem;line-height:1.6}
.confirm-actions{display:flex;gap:.8rem;justify-content:center}
.btn-confirm-del{background:var(--crimson);color:var(--white);border:none;padding:.7rem 1.5rem;font-family:'Noto Naskh Arabic',serif;font-size:.9rem;cursor:pointer;transition:.2s}
.btn-confirm-del:hover{background:var(--crimson-light)}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--text-muted);padding:.7rem 1.5rem;font-family:'Noto Naskh Arabic',serif;font-size:.9rem;cursor:pointer;transition:.2s}
.btn-cancel:hover{border-color:var(--white);color:var(--white)}

.loading-row{text-align:center;padding:2rem;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:2px solid rgba(139,0,0,.2);border-top-color:var(--crimson);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔑</div>
    <div class="login-title">لوحة إدارة المتجر</div>
    <div class="login-sub">متجر الجداحات الفاخرة</div>
    <input type="password" class="login-input" id="pass-input" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">دخول</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <header>
    <div class="header-logo">⚙️ لوحة الإدارة — موقع جداحات</div>
    <div class="header-actions">
      <a href="index.html" target="_blank" class="visit-btn">🔗 زيارة المتجر</a>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </header>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-count">—</div><div class="stat-label">عدد المنتجات</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-min">—</div><div class="stat-label">أقل سعر</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-max">—</div><div class="stat-label">أعلى سعر</div></div>
    </div>

    <!-- Add Product -->
    <div class="section-title">➕ إضافة منتج جديد</div>
    <div class="add-form">
      <div class="two-col">
        <div class="field"><label>اسم المنتج <span>*</span></label><input type="text" id="a-name" placeholder="مثال: زيبو كلاسيك"></div>
        <div class="field"><label>السعر بالدينار <span>*</span></label><input type="number" id="a-price" placeholder="65000"></div>
      </div>
      <div class="field"><label>الوصف <span>*</span></label><textarea id="a-desc" placeholder="وصف مختصر للمنتج..."></textarea></div>
      <div class="field"><label>بادج (اختياري)</label><input type="text" id="a-badge" placeholder="مثال: نادر · الأكثر مبيعاً · عرض خاص"></div>
      <div class="field">
        <label>صورة المنتج <span>*</span></label>
        <div class="img-upload" id="upload-zone">
          <input type="file" id="a-img" accept="image/*" onchange="previewImg(this)">
          <div class="img-upload-icon">📸</div>
          <div class="img-upload-text" id="upload-text">اضغط هنا لاختيار صورة<br><b>من تليفونك أو جهازك</b></div>
          <img id="img-preview" alt="معاينة">
        </div>
        <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <button class="add-btn" id="add-btn" onclick="addProduct()">✅ أضف المنتج للمتجر</button>
    </div>

    <!-- Products List -->
    <div class="section-title">📦 المنتجات الحالية <span id="products-count-label" style="color:var(--text-muted);font-size:.8rem;font-weight:400"></span></div>
    <div class="products-list" id="products-list">
      <div class="loading-row"><div class="spinner"></div>جاري التحميل...</div>
    </div>

  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-title">🗑️ تأكيد الحذف</div>
    <div class="confirm-msg" id="confirm-msg">هل أنت متأكد من حذف هذا المنتج؟ لا يمكن التراجع.</div>
    <div class="confirm-actions">
      <button class="btn-confirm-del" id="confirm-del-btn">نعم، احذف</button>
      <button class="btn-cancel" onclick="closeConfirm()">إلغاء</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://jwbxorakaxckrqhuzvto.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3YnhvcmFrYXhja3JxaHV6dnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzMzNzIsImV4cCI6MjA5MTU0OTM3Mn0.EtDQJx33MGrB--8IpwjKD5hCU85lmbuKuozevGiv8yA';
const ADMIN_PASS   = 'jadahat2025'; // ← كلمة المرور السرية — غيّرها!
const BUCKET       = 'products';
const H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

// ── AUTH ──
function login(){
  const val = document.getElementById('pass-input').value;
  if(val === ADMIN_PASS){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    sessionStorage.setItem('jadahat_admin','1');
    loadProducts();
  } else {
    document.getElementById('login-error').textContent='❌ كلمة المرور غلط';
    document.getElementById('pass-input').value='';
    setTimeout(()=>document.getElementById('login-error').textContent='',3000);
  }
}
function logout(){
  sessionStorage.removeItem('jadahat_admin');
  location.reload();
}
// Auto-login if session exists
if(sessionStorage.getItem('jadahat_admin')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  loadProducts();
}

// ── SUPABASE ──
async function getProducts(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=created_at.desc`,{headers:H});
  return r.ok?r.json():[];
}
async function uploadImage(file, onProgress){
  const ext=file.name.split('.').pop();
  const path=`${Date.now()}.${ext}`;
  onProgress(30);
  const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type},
    body:file
  });
  onProgress(80);
  if(!r.ok)throw new Error('فشل رفع الصورة');
  return{path,url:`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`};
}
async function insertProduct(data){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/products`,{
    method:'POST',
    headers:{...H,'Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||'فشل الحفظ');}
  return r.json();
}
async function deleteProduct(id,imagePath){
  if(imagePath){
    await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${imagePath}`,{method:'DELETE',headers:H});
  }
  await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`,{method:'DELETE',headers:H});
}

// ── RENDER ──
async function loadProducts(){
  const list=document.getElementById('products-list');
  list.innerHTML='<div class="loading-row"><div class="spinner"></div>جاري التحميل...</div>';
  try{
    const products=await getProducts();
    renderStats(products);
    if(!products.length){
      list.innerHTML='<div class="empty-msg">📦 لا توجد منتجات بعد — أضف أول منتج من الأعلى</div>';
      document.getElementById('products-count-label').textContent='';
      return;
    }
    document.getElementById('products-count-label').textContent=`(${products.length} منتج)`;
    list.innerHTML=products.map(p=>`
      <div class="product-row" id="pr-${p.id}">
        ${p.image_url?`<img class="product-thumb" src="${p.image_url}" alt="${p.name}">`:`<div class="product-thumb-ph">🔥</div>`}
        <div class="product-info">
          <div class="product-row-name">${p.name}</div>
          <div class="product-row-price">${Number(p.price).toLocaleString('ar-IQ')} دينار</div>
          ${p.badge?`<div class="product-row-badge">🏷️ ${p.badge}</div>`:''}
        </div>
        <div class="product-actions">
          <button class="btn-del" onclick="askDelete('${p.id}','${(p.image_path||'').replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}')">🗑️ حذف</button>
        </div>
      </div>`).join('');
  }catch(e){
    list.innerHTML=`<div class="empty-msg">⚠️ تعذر التحميل: ${e.message}</div>`;
  }
}

function renderStats(products){
  document.getElementById('stat-count').textContent=products.length;
  if(products.length){
    const prices=products.map(p=>p.price);
    document.getElementById('stat-min').textContent=Math.min(...prices).toLocaleString('ar-IQ');
    document.getElementById('stat-max').textContent=Math.max(...prices).toLocaleString('ar-IQ');
  } else {
    document.getElementById('stat-min').textContent='—';
    document.getElementById('stat-max').textContent='—';
  }
}

// ── ADD ──
function previewImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=document.getElementById('img-preview');
    img.src=e.target.result;img.style.display='block';
    document.querySelector('.img-upload-icon').style.display='none';
    document.getElementById('upload-text').innerHTML=`<b>${file.name}</b>`;
  };
  reader.readAsDataURL(file);
}

async function addProduct(){
  const name  =document.getElementById('a-name').value.trim();
  const price =document.getElementById('a-price').value.trim();
  const desc  =document.getElementById('a-desc').value.trim();
  const badge =document.getElementById('a-badge').value.trim();
  const file  =document.getElementById('a-img').files[0];
  if(!name||!price||!desc){showToast('⚠️ يرجى تعبئة الاسم والسعر والوصف','error');return;}
  if(!file){showToast('⚠️ يرجى اختيار صورة','error');return;}

  const btn=document.getElementById('add-btn');
  const pb=document.getElementById('progress-bar');
  const pf=document.getElementById('progress-fill');
  btn.disabled=true;btn.textContent='⏳ جاري الرفع...';
  pb.style.display='block';pf.style.width='10%';

  try{
    const{path,url}=await uploadImage(file,pct=>{pf.style.width=pct+'%';});
    pf.style.width='95%';
    await insertProduct({name,price:parseInt(price),description:desc,badge:badge||null,image_url:url,image_path:path});
    pf.style.width='100%';
    showToast('✅ تمت إضافة المنتج بنجاح!');
    // reset
    setTimeout(()=>{pb.style.display='none';pf.style.width='0%';},600);
    ['a-name','a-price','a-desc','a-badge'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('a-img').value='';
    document.getElementById('img-preview').style.display='none';
    document.querySelector('.img-upload-icon').style.display='block';
    document.getElementById('upload-text').innerHTML='اضغط هنا لاختيار صورة<br><b>من تليفونك أو جهازك</b>';
    await loadProducts();
  }catch(e){
    showToast('❌ '+e.message,'error');
    pb.style.display='none';pf.style.width='0%';
  }finally{
    btn.disabled=false;btn.textContent='✅ أضف المنتج للمتجر';
  }
}

// ── DELETE ──
let pendingDelete={};
function askDelete(id,imagePath,name){
  pendingDelete={id,imagePath,name};
  document.getElementById('confirm-msg').textContent=`هل تريد حذف "${name}"؟ لا يمكن التراجع.`;
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('confirm-del-btn').onclick=doDelete;
}
function closeConfirm(){
  document.getElementById('confirm-modal').classList.remove('open');
  pendingDelete={};
}
async function doDelete(){
  closeConfirm();
  try{
    await deleteProduct(pendingDelete.id,pendingDelete.imagePath);
    document.getElementById('pr-'+pendingDelete.id)?.remove();
    showToast('🗑️ تم الحذف بنجاح');
    await loadProducts();
  }catch{showToast('❌ فشل الحذف','error');}
}

// ── UTILS ──
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=type==='error'?'error show':'show';
  setTimeout(()=>t.classList.remove('show'),4000);
}
</script>
</body>
</html>
